<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        background: #1e1e2e;
        color: white;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        border-radius: 10px; /* Funktioniert dank transparent: true */
        overflow: hidden;
      }
      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.1);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border-left-color: #89b4fa;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <h2>Load Backend...</h2>
  </body>
</html>
